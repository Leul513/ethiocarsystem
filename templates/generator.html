<!-- templates/generator.html -->
<!DOCTYPE html>
<html>
<head>
<title>Team Generator</title>
<style>
body { font-family: Arial; text-align:center; background:#f2f2f2; }
.box { background:white; padding:20px; margin:50px auto; width:320px; border-radius:10px; }
input, button { margin:10px; padding:8px; width:90%; }
</style>
</head>
<body>

<div class="box">
<h2>Create Team</h2>

<form action="/generate" method="POST" enctype="multipart/form-data">
    <input name="team_name" placeholder="Team Name" required>
    <input name="members" type="number" placeholder="Number of Members" required>
    
    <input type="file" name="image" required>

    <button type="submit">Generate Team</button>
</form>

<a href="/databasee">View Database</a>
</div>

</body>
</html>
